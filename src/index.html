<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Vinyl Widget</title>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .disc-container {
            position: relative;
            width: 260px;
            height: 260px;
        }

        .album-art {
            position: absolute;
            top: 0;
            left: 0;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
        }

        .vinyl-ring {
    position: absolute;
    top: 0;
    left: 0;
    width: 260px;
    height: 260px;
}

.controls {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.disc-container:hover .controls {
    opacity: 1;
}

.controls button {
    background: rgba(0, 0, 0, 0.6);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

.controls button:hover {
    background: rgba(255, 255, 255, 0.2);
}
    </style>
</head>

<body>
    <div class="disc-container">
        <div class="album-art"></div>
        <img class="vinyl-ring" src="../assets/frames/ring-0.png">
         <div class="controls">
        <button class="btn-prev">⏮</button>
        <button class="btn-playpause">⏸</button>
        <button class="btn-next">⏭</button>
    </div>
    </div>
   

    <script src="app.js"></script>
</body>
</html>
